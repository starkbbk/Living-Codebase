<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Codebase — Fault Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:      #080b0f;
    --bg2:     #0d1117;
    --bg3:     #111820;
    --border:  #1e2d3d;
    --green:   #00ff9d;
    --red:     #ff3d5a;
    --amber:   #ffb800;
    --blue:    #4d9fff;
    --muted:   #4a6178;
    --text:    #c9d8e8;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid scanlines effect */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,157,0.012) 2px,
      rgba(0,255,157,0.012) 4px
    );
    pointer-events:none;
    z-index:999;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top:0; z-index:100;
  }

  .logo {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .logo span { color: var(--green); }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.2);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }

  .header-right { display:flex; gap:20px; align-items:center; }
  .pid-tag {
    font-size: 11px; color: var(--muted);
  }
  .pid-tag b { color: var(--blue); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 1px;
    background: var(--border);
    height: calc(100vh - 57px);
  }

  .panel {
    background: var(--bg2);
    padding: 20px;
    overflow: hidden;
  }

  .panel-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content:'';
    flex:1;
    height:1px;
    background: var(--border);
  }

  /* ── METRIC CARDS ── */
  .metrics {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
  }

  .metric {
    background: var(--bg2);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height: 2px;
  }
  .metric.green::before  { background: var(--green); }
  .metric.red::before    { background: var(--red); }
  .metric.amber::before  { background: var(--amber); }
  .metric.blue::before   { background: var(--blue); }
  .metric.purple::before { background: #9d7aff; }

  .metric-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .metric-value {
    font-family: var(--sans);
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    color: #fff;
  }
  .metric-value.green  { color: var(--green); }
  .metric-value.red    { color: var(--red); }
  .metric-value.amber  { color: var(--amber); }
  .metric-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── EVENT FEED ── */
  .event-feed {
    grid-column: 1 / 3;
    grid-row: 2 / 4;
    display: flex;
    flex-direction: column;
  }

  .feed-scroll {
    flex:1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .event-item {
    display: grid;
    grid-template-columns: 80px 90px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,45,61,0.5);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateX(-8px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .event-time { color: var(--muted); font-size: 11px; }

  .event-type {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .type-uaf    { background: rgba(255,61,90,0.15);  color: var(--red);   border: 1px solid rgba(255,61,90,0.3); }
  .type-ok     { background: rgba(0,255,157,0.08);  color: var(--green); border: 1px solid rgba(0,255,157,0.2); }
  .type-df     { background: rgba(255,184,0,0.1);   color: var(--amber); border: 1px solid rgba(255,184,0,0.3); }
  .type-oob    { background: rgba(77,159,255,0.1);  color: var(--blue);  border: 1px solid rgba(77,159,255,0.3);}
  .type-healed { background: rgba(157,122,255,0.1); color: #9d7aff;      border: 1px solid rgba(157,122,255,0.3);}

  .event-detail { color: var(--text); font-size: 12px; }
  .event-detail code {
    color: var(--blue);
    background: rgba(77,159,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
  }

  .event-mttr {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }
  .event-mttr.fast { color: var(--green); }

  /* ── MTTR CHART ── */
  .chart-panel {
    grid-column: 3;
    grid-row: 2;
    display: flex;
    flex-direction: column;
  }

  .bar-chart {
    flex:1;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding-top: 8px;
  }
  .bar-wrap {
    flex:1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    min-height: 4px;
  }
  .bar.self { background: var(--green); opacity:0.85; }
  .bar.trad { background: var(--red);   opacity:0.5; }
  .bar-label { font-size: 9px; color: var(--muted); text-align:center; }

  /* ── PATCH LOG ── */
  .patch-panel {
    grid-column: 3;
    grid-row: 3;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .patch-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
    animation: slideIn 0.3s ease;
  }
  .patch-header {
    display:flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .patch-fault { color: var(--red); font-size: 11px; font-weight:500; }
  .patch-score {
    font-size: 11px;
    color: var(--green);
  }
  .patch-code {
    font-size: 11px;
    color: #6b9fd4;
    line-height: 1.6;
    padding: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    border-left: 2px solid var(--green);
  }
  .patch-footer {
    display:flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
  }
  .patch-footer span { color: var(--green); }

  /* ── CONTROLS ── */
  .controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 8px;
    z-index: 200;
  }
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--green); color: var(--green); }
  .btn.primary {
    background: rgba(0,255,157,0.1);
    border-color: rgba(0,255,157,0.4);
    color: var(--green);
  }
  .btn.primary:hover { background: rgba(0,255,157,0.2); }
  .btn.danger {
    background: rgba(255,61,90,0.1);
    border-color: rgba(255,61,90,0.3);
    color: var(--red);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">living<span>.</span>codebase</div>
  <div class="header-right">
    <div class="pid-tag">target PID: <b id="target-pid">—</b></div>
    <div class="pid-tag">uptime: <b id="uptime">00:00:00</b></div>
    <div class="status-pill">
      <div class="pulse" id="status-pulse"></div>
      <span id="status-text">monitoring</span>
    </div>
  </div>
</header>

<!-- METRICS ROW -->
<div class="layout">
  <div class="metrics">
    <div class="metric green">
      <div class="metric-label">Faults Healed</div>
      <div class="metric-value green" id="m-healed">0</div>
      <div class="metric-sub">zero downtime</div>
    </div>
    <div class="metric red">
      <div class="metric-label">Faults Detected</div>
      <div class="metric-value" id="m-detected">0</div>
      <div class="metric-sub" id="m-detected-sub">waiting...</div>
    </div>
    <div class="metric amber">
      <div class="metric-label">Avg MTTR</div>
      <div class="metric-value amber" id="m-mttr">—</div>
      <div class="metric-sub">vs 2847ms traditional</div>
    </div>
    <div class="metric blue">
      <div class="metric-label">Z3 Verified</div>
      <div class="metric-value" id="m-z3">0/0</div>
      <div class="metric-sub">safety properties</div>
    </div>
    <div class="metric purple">
      <div class="metric-label">GA Best Score</div>
      <div class="metric-value" id="m-score">—</div>
      <div class="metric-sub">out of 160</div>
    </div>
  </div>

  <!-- EVENT FEED -->
  <div class="panel event-feed" style="grid-column:1/3; grid-row:2/4;">
    <div class="panel-title">live event feed</div>
    <div class="feed-scroll" id="feed"></div>
  </div>

  <!-- MTTR CHART -->
  <div class="panel chart-panel">
    <div class="panel-title">mttr comparison (ms)</div>
    <div class="bar-chart" id="bar-chart"></div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:10px;">
      <span style="display:flex;align-items:center;gap:4px;">
        <span style="width:10px;height:10px;background:var(--green);border-radius:2px;display:inline-block;opacity:0.85"></span>
        self-healing
      </span>
      <span style="display:flex;align-items:center;gap:4px;">
        <span style="width:10px;height:10px;background:var(--red);border-radius:2px;display:inline-block;opacity:0.5"></span>
        traditional
      </span>
    </div>
  </div>

  <!-- PATCH LOG -->
  <div class="panel patch-panel">
    <div class="panel-title">generated patches</div>
    <div id="patch-log" style="overflow-y:auto;flex:1;"></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn" onclick="clearFeed()">clear</button>
  <button class="btn danger" onclick="injectFault()">inject fault</button>
  <button class="btn primary" onclick="toggleSim()">
    <span id="sim-btn-text">▶ start simulation</span>
  </button>
</div>

<script>
// ── STATE ──
let simRunning = false;
let simInterval = null;
let uptimeInterval = null;
let startTime = null;
let stats = { healed:0, detected:0, mttrSum:0, mttrCount:0, z3pass:0, z3total:0, bestScore:0 };
let mttrHistory = [];
let eventCount = 0;

const FAULT_TYPES = ['UAF','DoubleFree','NullDeref','OutOfBounds'];
const ADDRS = ['0x1000','0x2000','0x3000','0x4800','0x7f3c00','0xa000'];

const PATCHES = {
  UAF: {
    code: 'if ptr.is_valid() { *ptr = value; }',
    comment: '// ownership check before write'
  },
  DoubleFree: {
    code: 'free(ptr); ptr = nullptr;',
    comment: '// null after free — prevents reuse'
  },
  NullDeref: {
    code: 'if !ptr.is_null() { *ptr = val; }',
    comment: '// null guard inserted'
  },
  OutOfBounds: {
    code: 'idx = idx.clamp(0, len - 1);',
    comment: '// bounds clamped via Z3 proof'
  }
};

// ── UPTIME ──
function formatUptime(ms) {
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return [h,m,sec].map(x=>String(x).padStart(2,'0')).join(':');
}

// ── ADD EVENT ──
function addEvent(type, detail, mttr=null) {
  const feed = document.getElementById('feed');
  const now = new Date();
  const time = now.toTimeString().slice(0,8);

  const typeMap = {
    'OK':'type-ok','UAF':'type-uaf','DoubleFree':'type-df',
    'NullDeref':'type-df','OutOfBounds':'type-oob','HEALED':'type-healed'
  };
  const typeClass = typeMap[type] || 'type-ok';
  const typeLabel = type === 'DoubleFree' ? 'D-FREE' :
                    type === 'NullDeref'  ? 'NULL'   :
                    type === 'OutOfBounds'? 'OOB'    : type;

  const mttrStr = mttr ? `<span class="fast">${mttr}ms</span>` :
                  type === 'OK' ? '<span>—</span>' : '';

  const el = document.createElement('div');
  el.className = 'event-item';
  el.innerHTML = `
    <span class="event-time">${time}</span>
    <span class="event-type ${typeClass}">${typeLabel}</span>
    <span class="event-detail">${detail}</span>
    <span class="event-mttr">${mttrStr}</span>
  `;
  feed.prepend(el);

  // keep last 80
  while(feed.children.length > 80) feed.removeChild(feed.lastChild);
  eventCount++;
}

// ── ADD PATCH ──
function addPatch(faultType, addr, score, mttr, gens) {
  const log = document.getElementById('patch-log');
  const p = PATCHES[faultType];
  const el = document.createElement('div');
  el.className = 'patch-item';
  el.innerHTML = `
    <div class="patch-header">
      <span class="patch-fault">${faultType} @ ${addr}</span>
      <span class="patch-score">score ${score}/160</span>
    </div>
    <div class="patch-code">${p.comment}<br>${p.code}</div>
    <div class="patch-footer">
      <span>gen ${gens}</span> ·
      <span>${mttr}ms</span> ·
      <span>Z3 ✅</span> ·
      ptrace hot-swap
    </div>
  `;
  log.prepend(el);
  while(log.children.length > 6) log.removeChild(log.lastChild);
}

// ── MTTR BAR CHART ──
function updateChart() {
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  const TRAD_MS = 2847;
  const maxMs = TRAD_MS + 200;

  const labels = ['F1','F2','F3','F4','F5','F6','F7','F8'];
  const history = mttrHistory.slice(-8);

  history.forEach((mttr, i) => {
    const selfH  = Math.round((mttr / maxMs) * 100);
    const tradH  = Math.round((TRAD_MS / maxMs) * 100);
    const wrap   = document.createElement('div');
    wrap.className = 'bar-wrap';
    wrap.innerHTML = `
      <div style="font-size:9px;color:var(--muted)">${mttr}ms</div>
      <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:120px;">
        <div class="bar self" style="height:${selfH}%;flex:1"></div>
        <div class="bar trad" style="height:${tradH}%;flex:1"></div>
      </div>
      <div class="bar-label">${labels[i]||'F'+(i+1)}</div>
    `;
    chart.appendChild(wrap);
  });
}

// ── UPDATE METRICS ──
function updateMetrics() {
  document.getElementById('m-healed').textContent    = stats.healed;
  document.getElementById('m-detected').textContent  = stats.detected;
  document.getElementById('m-detected-sub').textContent =
    stats.detected > 0 ? `${stats.healed} healed, ${stats.detected - stats.healed} pending` : 'waiting...';
  const avgMttr = stats.mttrCount > 0
    ? Math.round(stats.mttrSum / stats.mttrCount) + 'ms'
    : '—';
  document.getElementById('m-mttr').textContent  = avgMttr;
  document.getElementById('m-z3').textContent    = `${stats.z3pass}/${stats.z3total}`;
  document.getElementById('m-score').textContent = stats.bestScore > 0 ? stats.bestScore : '—';
}

// ── SIMULATE ONE TICK ──
function simTick() {
  const roll = Math.random();

  if (roll < 0.45) {
    // OK event
    const ops   = ['malloc','write','free','read'];
    const op    = ops[Math.floor(Math.random()*ops.length)];
    const addr  = ADDRS[Math.floor(Math.random()*ADDRS.length)];
    const size  = [32,64,128,256][Math.floor(Math.random()*4)];
    addEvent('OK', `<code>${op}</code> @ <code>${addr}</code>${op==='malloc'?' size='+size:''}`, null);

  } else {
    // FAULT event
    const fType = FAULT_TYPES[Math.floor(Math.random()*FAULT_TYPES.length)];
    const addr  = ADDRS[Math.floor(Math.random()*ADDRS.length)];
    stats.detected++;
    addEvent(fType, `fault at <code>${addr}</code> — GA patch starting...`, null);
    updateMetrics();

    // Simulate healing delay
    const mttr  = 200 + Math.floor(Math.random()*250);
    const score = 130 + Math.floor(Math.random()*30);
    const gens  = Math.floor(Math.random()*3)+1;
    stats.z3total += 4;
    stats.z3pass  += 4;

    setTimeout(() => {
      stats.healed++;
      stats.mttrSum  += mttr;
      stats.mttrCount++;
      stats.bestScore = Math.max(stats.bestScore, score);
      mttrHistory.push(mttr);

      addEvent('HEALED',
        `<code>${fType}</code> @ <code>${addr}</code> — Z3 ✅ hot-swap complete`,
        mttr);
      addPatch(fType, addr, score, mttr, gens);
      updateMetrics();
      updateChart();

      document.getElementById('target-pid').textContent =
        99000 + Math.floor(Math.random()*999);
    }, mttr);
  }
}

// ── TOGGLE SIM ──
function toggleSim() {
  simRunning = !simRunning;
  const btn = document.getElementById('sim-btn-text');

  if (simRunning) {
    btn.textContent = '⏸ pause simulation';
    startTime = startTime || Date.now();
    simInterval = setInterval(simTick, 900);
    uptimeInterval = setInterval(() => {
      document.getElementById('uptime').textContent =
        formatUptime(Date.now() - startTime);
    }, 1000);
    // immediate first tick
    simTick();
  } else {
    btn.textContent = '▶ resume simulation';
    clearInterval(simInterval);
    clearInterval(uptimeInterval);
  }
}

// ── INJECT FAULT ──
function injectFault() {
  const fType = FAULT_TYPES[Math.floor(Math.random()*FAULT_TYPES.length)];
  const addr  = ADDRS[Math.floor(Math.random()*ADDRS.length)];
  stats.detected++;
  addEvent(fType, `<b style="color:var(--red)">MANUAL INJECT</b> — ${fType} @ <code>${addr}</code>`, null);
  updateMetrics();

  const mttr = 180 + Math.floor(Math.random()*150);
  stats.z3total += 4; stats.z3pass += 4;

  setTimeout(() => {
    stats.healed++;
    stats.mttrSum  += mttr;
    stats.mttrCount++;
    const score = 140 + Math.floor(Math.random()*20);
    stats.bestScore = Math.max(stats.bestScore, score);
    mttrHistory.push(mttr);
    addEvent('HEALED', `<code>${fType}</code> @ <code>${addr}</code> — manually injected fault healed`, mttr);
    addPatch(fType, addr, score, mttr, 1);
    updateMetrics();
    updateChart();
  }, mttr);
}

// ── CLEAR ──
function clearFeed() {
  document.getElementById('feed').innerHTML = '';
  document.getElementById('patch-log').innerHTML = '';
  document.getElementById('bar-chart').innerHTML = '';
  stats = { healed:0, detected:0, mttrSum:0, mttrCount:0, z3pass:0, z3total:0, bestScore:0 };
  mttrHistory = [];
  updateMetrics();
}

// Init
updateMetrics();
</script>
</body>
</html>
